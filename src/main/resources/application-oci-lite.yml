spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: 3000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 20

archive:
  outbox:
    chunk-size: ${OUTBOX_CHUNK_SIZE:20}
    scheduler:
      enabled: ${OUTBOX_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${OUTBOX_SCHEDULER_FIXED_DELAY_MS:60000}

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:40}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:4}
