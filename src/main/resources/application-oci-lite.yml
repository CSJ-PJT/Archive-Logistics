spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      connection-timeout: 3000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 20

archive:
  runtime:
    autorun:
      enabled: ${ARCHIVE_RUNTIME_AUTORUN_ENABLED:false}
    tick-interval: ${ARCHIVE_RUNTIME_TICK_INTERVAL:60s}
    initial-delay: ${ARCHIVE_RUNTIME_INITIAL_DELAY:30s}
    max-events-per-tick: ${ARCHIVE_RUNTIME_MAX_EVENTS_PER_TICK:2}
    max-backlog-per-tick: ${ARCHIVE_RUNTIME_MAX_BACKLOG_PER_TICK:10}
  outbox:
    chunk-size: ${ARCHIVE_OUTBOX_CHUNK_SIZE:20}
    scheduler:
      enabled: ${ARCHIVE_OUTBOX_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${ARCHIVE_OUTBOX_SCHEDULER_FIXED_DELAY_MS:60000}

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:40}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:4}
