spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/archive_logitics}
    username: ${SPRING_DATASOURCE_USERNAME:archive}
    password: ${SPRING_DATASOURCE_PASSWORD:archive}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
  jpa:
    show-sql: false

logging:
  level:
    com.csj.archive.logistics: INFO

archive:
  ledger:
    enabled: ${ARCHIVE_LEDGER_ENABLED:true}
    base-url: ${ARCHIVE_LEDGER_BASE_URL:http://localhost:18080}
    bulk-endpoint: ${ARCHIVE_LEDGER_BULK_ENDPOINT:/api/events/logistics/bulk}
    contract-mode: ${ARCHIVE_LEDGER_CONTRACT_MODE:LOGISTICS_CONFIRMED_NATIVE}
  outbox:
    scheduler:
      enabled: ${ARCHIVE_OUTBOX_SCHEDULER_ENABLED:true}
      fixed-delay-ms: ${ARCHIVE_OUTBOX_SCHEDULER_FIXED_DELAY_MS:30000}
  nexus-settlement:
    enabled: ${ARCHIVE_NEXUS_SETTLEMENT_ENABLED:true}
    base-url: ${ARCHIVE_NEXUS_BASE_URL:http://localhost:8080}
    daily-endpoint: ${ARCHIVE_NEXUS_DAILY_SETTLEMENT_ENDPOINT:/api/logistics/settlements/daily}
    publish-timeout-ms: ${ARCHIVE_NEXUS_SETTLEMENT_TIMEOUT_MS:30000}
    max-retry-count: ${ARCHIVE_NEXUS_SETTLEMENT_MAX_RETRY_COUNT:5}
    manufacturing-share-rate: ${ARCHIVE_NEXUS_MANUFACTURING_SHARE_RATE:0.3000}
    scheduler:
      enabled: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_ENABLED:true}
      fixed-delay-ms: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_FIXED_DELAY_MS:300000}
      initial-delay-ms: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_INITIAL_DELAY_MS:45000}
      date-offset-days: ${ARCHIVE_NEXUS_SETTLEMENT_DATE_OFFSET_DAYS:0}
