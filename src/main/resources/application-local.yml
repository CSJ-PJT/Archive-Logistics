spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15434/archive_logitics}
    username: ${SPRING_DATASOURCE_USERNAME:archive}
    password: ${SPRING_DATASOURCE_PASSWORD:archive}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
  jpa:
    show-sql: false

logging:
  level:
    com.csj.archive.logistics: INFO

archive:
  ledger:
    enabled: ${ARCHIVE_LEDGER_ENABLED:false}
    base-url: ${ARCHIVE_LEDGER_BASE_URL:http://localhost:18080}
    bulk-endpoint: ${ARCHIVE_LEDGER_BULK_ENDPOINT:/api/events/nexus/bulk}
    contract-mode: ${ARCHIVE_LEDGER_CONTRACT_MODE:ARCHIVE_LEDGER_V1_COMPAT}
