spring:
  application:
    name: Archive-Logistics
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

server:
  port: ${SERVER_PORT:8092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Archive-Logistics
    description: Synthetic logistics event backend for Archive Platform Ecosystem

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

archive:
  ledger:
    enabled: ${ARCHIVE_LEDGER_ENABLED:false}
    base-url: ${ARCHIVE_LEDGER_BASE_URL:http://localhost:8093}
    bulk-endpoint: ${ARCHIVE_LEDGER_BULK_ENDPOINT:/api/events/logistics/bulk}
    publish-timeout-ms: ${ARCHIVE_LEDGER_PUBLISH_TIMEOUT_MS:30000}
    contract-mode: ${ARCHIVE_LEDGER_CONTRACT_MODE:LOGISTICS_CONFIRMED_NATIVE}
  outbox:
    chunk-size: ${ARCHIVE_OUTBOX_CHUNK_SIZE:50}
    max-retry-count: ${ARCHIVE_OUTBOX_MAX_RETRY_COUNT:5}
    scheduler:
      enabled: ${ARCHIVE_OUTBOX_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${ARCHIVE_OUTBOX_SCHEDULER_FIXED_DELAY_MS:30000}
  nexus-settlement:
    enabled: ${ARCHIVE_NEXUS_SETTLEMENT_ENABLED:false}
    base-url: ${ARCHIVE_NEXUS_BASE_URL:http://localhost:8080}
    daily-endpoint: ${ARCHIVE_NEXUS_DAILY_SETTLEMENT_ENDPOINT:/api/logistics/settlements/daily}
    publish-timeout-ms: ${ARCHIVE_NEXUS_SETTLEMENT_TIMEOUT_MS:30000}
    max-retry-count: ${ARCHIVE_NEXUS_SETTLEMENT_MAX_RETRY_COUNT:5}
    manufacturing-share-rate: ${ARCHIVE_NEXUS_MANUFACTURING_SHARE_RATE:0.3000}
    scheduler:
      enabled: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_FIXED_DELAY_MS:300000}
      initial-delay-ms: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_INITIAL_DELAY_MS:45000}
      date-offset-days: ${ARCHIVE_NEXUS_SETTLEMENT_DATE_OFFSET_DAYS:0}
  economy:
    enabled: ${ARCHIVE_ECONOMY_ENABLED:false}
    publish-enabled: ${ARCHIVE_ECONOMY_PUBLISH_ENABLED:false}
