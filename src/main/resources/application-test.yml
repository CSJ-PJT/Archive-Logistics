spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/archive_logitics_test}
    username: ${SPRING_DATASOURCE_USERNAME:archive}
    password: ${SPRING_DATASOURCE_PASSWORD:archive}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    show-sql: false

archive:
  ledger:
    enabled: false
    base-url: http://localhost:18080
    bulk-endpoint: /api/events/logistics/bulk
    contract-mode: LOGISTICS_CONFIRMED_NATIVE
  outbox:
    chunk-size: 25
    max-retry-count: 5
    scheduler:
      enabled: false
  nexus-settlement:
    enabled: false
    base-url: http://localhost:8080
    daily-endpoint: /api/logistics/settlements/daily
    publish-timeout-ms: 30000
    max-retry-count: 5
    manufacturing-share-rate: 0.3000
