services:
  archive-logitics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archive-logitics
    depends_on:
      archive-logitics-postgres:
        condition: service_healthy
    ports:
      - "8092:8092"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://archive-logitics-postgres:5432/archive_logitics
      SPRING_DATASOURCE_USERNAME: archive
      SPRING_DATASOURCE_PASSWORD: archive
      ARCHIVE_LEDGER_ENABLED: ${ARCHIVE_LEDGER_ENABLED:-true}
      ARCHIVE_LEDGER_BASE_URL: ${ARCHIVE_LEDGER_BASE_URL:-http://host.docker.internal:18080}
      ARCHIVE_LEDGER_BULK_ENDPOINT: ${ARCHIVE_LEDGER_BULK_ENDPOINT:-/api/events/logistics/bulk}
      ARCHIVE_LEDGER_CONTRACT_MODE: ${ARCHIVE_LEDGER_CONTRACT_MODE:-LOGISTICS_CONFIRMED_NATIVE}
      ARCHIVE_LEDGER_PUBLISH_TIMEOUT_MS: ${ARCHIVE_LEDGER_PUBLISH_TIMEOUT_MS:-30000}
      ARCHIVE_OUTBOX_CHUNK_SIZE: ${ARCHIVE_OUTBOX_CHUNK_SIZE:-50}
      ARCHIVE_OUTBOX_MAX_RETRY_COUNT: ${ARCHIVE_OUTBOX_MAX_RETRY_COUNT:-5}
      ARCHIVE_OUTBOX_SCHEDULER_ENABLED: ${ARCHIVE_OUTBOX_SCHEDULER_ENABLED:-true}
      ARCHIVE_OUTBOX_SCHEDULER_FIXED_DELAY_MS: ${ARCHIVE_OUTBOX_SCHEDULER_FIXED_DELAY_MS:-30000}
      ARCHIVE_NEXUS_SETTLEMENT_ENABLED: ${ARCHIVE_NEXUS_SETTLEMENT_ENABLED:-true}
      ARCHIVE_NEXUS_BASE_URL: ${ARCHIVE_NEXUS_BASE_URL:-http://host.docker.internal:8080}
      ARCHIVE_NEXUS_DAILY_SETTLEMENT_ENDPOINT: ${ARCHIVE_NEXUS_DAILY_SETTLEMENT_ENDPOINT:-/api/logistics/settlements/daily}
      ARCHIVE_NEXUS_SETTLEMENT_TIMEOUT_MS: ${ARCHIVE_NEXUS_SETTLEMENT_TIMEOUT_MS:-30000}
      ARCHIVE_NEXUS_SETTLEMENT_MAX_RETRY_COUNT: ${ARCHIVE_NEXUS_SETTLEMENT_MAX_RETRY_COUNT:-5}
      ARCHIVE_NEXUS_MANUFACTURING_SHARE_RATE: ${ARCHIVE_NEXUS_MANUFACTURING_SHARE_RATE:-0.3000}
      ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_ENABLED: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_ENABLED:-true}
      ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_FIXED_DELAY_MS: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_FIXED_DELAY_MS:-300000}
      ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_INITIAL_DELAY_MS: ${ARCHIVE_NEXUS_SETTLEMENT_SCHEDULER_INITIAL_DELAY_MS:-45000}
      ARCHIVE_NEXUS_SETTLEMENT_DATE_OFFSET_DAYS: ${ARCHIVE_NEXUS_SETTLEMENT_DATE_OFFSET_DAYS:-0}
      ARCHIVE_ECONOMY_ENABLED: ${ARCHIVE_ECONOMY_ENABLED:-true}
      ARCHIVE_ECONOMY_PUBLISH_ENABLED: ${ARCHIVE_ECONOMY_PUBLISH_ENABLED:-false}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx768m}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  archive-logitics-postgres:
    image: postgres:16-alpine
    container_name: archive-logitics-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: archive_logitics
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive
    volumes:
      - archive-logitics-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive -d archive_logitics"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  archive-logitics-postgres-data:
